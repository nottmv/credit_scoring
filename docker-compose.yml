services:
  api:
    build: .
    image: credit-scoring-api:latest
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    environment:
      MODEL_PATH: /app/models/model_bundle_catboost.pkl
      ADMIN_RELOAD_TOKEN: ${ADMIN_RELOAD_TOKEN:-dev-token-change-me}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_UI_URL: http://localhost:${MLFLOW_HOST_PORT:-5001}
    volumes:
      - ./models:/app/models:ro
      - scoring_reports:/app/reports
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow/Dockerfile
    image: credit-scoring-mlflow:latest
    ports:
      - "${MLFLOW_HOST_PORT:-5001}:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.socket(); s.connect(('127.0.0.1',5000)); s.close()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 12s

  prometheus:
    image: prom/prometheus:v2.49.1
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.2.3
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  mlflow_data:
  scoring_reports:
