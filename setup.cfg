[flake8]
max-line-length = 100
exclude =
    .venv,
    .git,
    __pycache__,
    mlruns,
    data,
    docs,
    reports,
    models,
    *.egg-info
per-file-ignores =
    tests/*:E501
    src/models/mlflow_viz.py:E402

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
asyncio_mode = auto
