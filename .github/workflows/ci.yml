name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -r requirements.txt
      - name: Lint
        run: flake8 --max-line-length=100 --extend-exclude=.dvc src tests scripts
      - name: Tests
        run: pytest -q tests

  docker:
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/credit-scoring-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/credit-scoring-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and verify API image on PR
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: credit-scoring-api:pr-check
      - name: Build MLflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/mlflow/Dockerfile
          push: false
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/credit-scoring-mlflow:ci

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - name: Update deployment image tag (GitOps for ArgoCD)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          sed -i "s|image:.*credit-scoring-api:.*|image: ghcr.io/${{ github.repository_owner }}/credit-scoring-api:${{ github.sha }}|" k8s/prod/deployment.yaml
          git add k8s/prod/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tag to ${{ github.sha }} [skip ci]"
          git push
