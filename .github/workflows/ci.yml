name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -r requirements.txt
      - name: Lint
        run: flake8 --max-line-length=100 --extend-exclude=.dvc src tests scripts
      - name: Tests
        run: pytest -q tests

  docker:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: credit-scoring-api:ci
      - name: Build MLflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/mlflow/Dockerfile
          push: false
          load: true
          tags: credit-scoring-mlflow:ci

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Kubernetes deploy (optional)
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${KUBE_CONFIG_B64:-}" ]; then
            echo "KUBE_CONFIG_B64 not set — skip kubectl."
            exit 0
          fi
          mkdir -p "${HOME}/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "${HOME}/.kube/config"
          kubectl apply -f k8s/mlflow.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/prometheus.yaml
          kubectl rollout status deployment/credit-scoring-api --timeout=120s || true
          kubectl rollout status deployment/mlflow --timeout=180s || true
          kubectl rollout status deployment/prometheus --timeout=90s || true
