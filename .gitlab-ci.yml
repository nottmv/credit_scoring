# GitLab CI mirror — lint, test, docker build; deploy on merge to main.

stages:
  - lint
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

default:
  image: python:3.11-slim
  cache:
    paths:
      - .cache/pip

lint:
  stage: lint
  script:
    - pip install -U pip setuptools wheel
    - pip install -r requirements.txt
    - flake8 --max-line-length=100 --extend-exclude=.dvc src tests scripts
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
    - if: $CI_COMMIT_BRANCH == "main"

test:
  stage: test
  script:
    - pip install -U pip setuptools wheel
    - pip install -r requirements.txt
    - pytest -q tests
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
    - if: $CI_COMMIT_BRANCH == "main"

docker-build:
  stage: build
  image: docker:24-cli
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker info
  script:
    - docker build -t credit-scoring-api:ci .
    - docker build -f docker/mlflow/Dockerfile -t credit-scoring-mlflow:ci .
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
    - if: $CI_COMMIT_BRANCH == "main"

deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - |
      if [ -z "${KUBE_CONFIG_B64:-}" ]; then
        echo "KUBE_CONFIG_B64 not set; skip deploy."
        exit 0
      fi
      mkdir -p "${HOME}/.kube"
      echo "$KUBE_CONFIG_B64" | base64 -d > "${HOME}/.kube/config"
      kubectl apply -f k8s/mlflow.yaml
      kubectl apply -f k8s/prod/deployment.yaml
      kubectl apply -f k8s/service.yaml
      kubectl apply -f k8s/prometheus.yaml
      kubectl apply -f k8s/ingress.yaml
      kubectl rollout status deployment/credit-scoring-api --timeout=120s || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
