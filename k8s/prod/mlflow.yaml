# MLflow tracking server — required for Registry URI in API Deployment.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  labels:
    app: mlflow
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: mlflow
          image: ghcr.io/nottmv/credit-scoring-mlflow:4005325e8c737966791afbc6be0d6d0fc3c04340
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: MLFLOW_BACKEND_STORE_URI
              value: "sqlite:////mlflow/mlflow.db"
            - name: MLFLOW_ARTIFACTS_DESTINATION
              value: "/mlflow/artifacts"
            - name: MLFLOW_DEFAULT_ARTIFACT_ROOT
              value: "mlflow-artifacts:/"
          volumeMounts:
            - name: v
              mountPath: /mlflow
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: v
          persistentVolumeClaim:
            claimName: mlflow-data
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
spec:
  type: ClusterIP
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
